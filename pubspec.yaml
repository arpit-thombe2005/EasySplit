name: easy_split
description: "EasySplit - Smart expense sharing with friends and groups"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Code Generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Hooks
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  socket_io_client: ^3.0.2

  # Local Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  dotted_border: ^2.1.0
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.20.1
  equatable: ^2.0.7
  uuid: ^4.5.1
  collection: ^1.19.1
  path: ^1.9.0
  rxdart: ^0.28.0

  # Form Validation
  formz: ^0.7.0

  # Date & Time
  table_calendar: ^3.1.3

  # Animations
  flutter_animate: ^4.5.0

  # Permissions
  permission_handler: ^11.3.1

  # App Utils
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.1.2
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
